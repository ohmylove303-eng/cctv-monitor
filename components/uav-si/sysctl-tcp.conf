# /etc/sysctl.d/99-uav-tcp.conf — OS 레벨 TCP keepalive (L2-B 보완)
# =================================================================
# 배포 방법: sysctl -p /etc/sysctl.d/99-uav-tcp.conf

# TCP keepalive idle: 60초 후 첫 탐침 (AWS ELB 60초 우회)
net.ipv4.tcp_keepalive_time = 60

# 탐침 간격: 10초
net.ipv4.tcp_keepalive_intvl = 10

# 탐침 횟수: 3회 무응답 시 연결 종료
net.ipv4.tcp_keepalive_probes = 3

# SYN 재전송 타임아웃 (빠른 연결 실패 감지)
net.ipv4.tcp_syn_retries = 3

# TIME_WAIT 재사용
net.ipv4.tcp_tw_reuse = 1
