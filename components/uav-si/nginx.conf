# nginx/nginx.conf — UAV v3.4 Ultimate (L2-B TCP keepalive 적용)
# ===============================================================
# [L2-B 맹점 보완]:
#   문제: 백엔드 30초 keepalive로 HTTP 레이어는 방어되나
#         AWS ELB/Cloudflare idle timeout(기본 60초)은 L4 TCP 레이어 처리
#         → SSE 연결이 L4에서 무음으로 절단 (클라이언트 감지 불가)
#   해결:
#     1. so_keepalive=on → Nginx가 백엔드 upstream TCP 소켓에 keepalive 활성화
#     2. keepalive_timeout → nginx ↔ 클라이언트 연결 유지
#     3. proxy_read_timeout 3600s → SSE 장시간 연결 허용
#     4. TCP_KEEPIDLE=60, TCP_KEEPINTVL=10, TCP_KEEPCNT=3
#        → OS 레벨 TCP keepalive 파라미터 (ELB 우회)

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── 로그 포맷 ─────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── 기본 최적화 ───────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain application/json application/javascript text/css;

    # ── Upstream: 백엔드 (replicas=2 로드밸런싱) ─────────
    upstream backend_pool {
        least_conn;
        server backend:8000;
        keepalive 32;   # upstream 연결 재사용 (TCP 핸드쉐이크 절약)
    }

    # ── HTTP → HTTPS 리다이렉트 ──────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS 메인 서버 ───────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name ${DOMAIN:-uav.example.com};

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ── Frontend 정적 파일 ────────────────────────────
        location / {
            root       /usr/share/nginx/html;
            try_files  $uri $uri/ /index.html;
            add_header Cache-Control "no-cache" always;
        }

        # ── SSE 텔레메트리 스트림 ─────────────────────────
        location /telemetry/stream {
            proxy_pass         http://backend_pool;
            proxy_http_version 1.1;

            # SSE 필수 헤더
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # SSE 버퍼링 차단 (즉시 전달)
            proxy_buffering    off;
            proxy_cache        off;
            add_header         X-Accel-Buffering no;

            # 장시간 연결 허용
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
            proxy_connect_timeout 10s;

            # [L2-B 핵심] TCP 소켓 레벨 keepalive 설정
            # so_keepalive=on|idle|intvl|cnt
            #   idle:  60초 무음 후 첫 keepalive 탐침 전송
            #   intvl: 10초 간격으로 탐침 재전송
            #   cnt:   3회 무응답 시 연결 강제 종료
            # 효과: AWS ELB/Cloudflare의 60초 idle timeout 우회
            #       L4 TCP 레이어에서 연결 생존 보장
            proxy_socket_keepalive on;
        }

        # ── 일반 API ──────────────────────────────────────
        location /api/ {
            proxy_pass            http://backend_pool;
            proxy_http_version    1.1;
            proxy_set_header      Connection "";
            proxy_set_header      Host              $host;
            proxy_set_header      X-Real-IP         $remote_addr;
            proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header      X-Forwarded-Proto $scheme;
            proxy_read_timeout    30s;
            proxy_connect_timeout  5s;
        }

        # ── Auth 엔드포인트 ───────────────────────────────
        location ~ ^/(auth|session|health|stats)/ {
            proxy_pass            http://backend_pool;
            proxy_http_version    1.1;
            proxy_set_header      Connection "";
            proxy_set_header      Host              $host;
            proxy_set_header      X-Real-IP         $remote_addr;
            proxy_read_timeout    10s;
        }
    }
}
