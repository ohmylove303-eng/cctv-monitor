services:
  - type: web
    name: its-forensic-api
    runtime: docker
    plan: free
    dockerfilePath: ./forensic-api/Dockerfile
    dockerContext: ./forensic-api
    healthCheckPath: /healthz
    autoDeployTrigger: "off"
    envVars:
      - key: PORT
        value: "10000"
      - key: FORENSIC_DEMO_MODE
        value: "false"
      - key: YOLO_MODEL_PATH
        value: "yolo26n.pt"
      - key: YOLO_CONFIDENCE
        value: "0.25"
      - key: OCR_ENGINE
        value: "easyocr"
      - key: OCR_LANG_LIST
        value: "ko,en"
      - key: OCR_FRAME_LIMIT
        value: "1"
      - key: ANALYZE_FRAME_LIMIT
        value: "4"
      - key: STREAM_OPEN_TIMEOUT_MS
        value: "5000"
      - key: STREAM_READ_TIMEOUT_MS
        value: "4000"
      - key: STREAM_TOTAL_BUDGET_MS
        value: "12000"
      - key: TRACK_CAMERA_LIMIT
        value: "24"
      - key: TRACK_HIT_LIMIT
        value: "12"
